name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Existing release version/tag (for example 1.2.3 or v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark release as pre-release (workflow_dispatch only)"
        required: true
        default: false
        type: boolean
      sign_artifacts:
        description: "Sign artifacts with GPG (requires release signing secrets)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-native-helper-linux:
    name: Build bundled native helper (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux native helper
        run: |
          bash tools/build_native_spectrum_helper_c_poc.sh /tmp/native_spectrum_helper_c_poc

      - name: Upload Linux native helper
        uses: actions/upload-artifact@v4
        with:
          name: native-spectrum-helper-linux
          path: /tmp/native_spectrum_helper_c_poc
          if-no-files-found: error

  build-native-helper-windows:
    name: Build bundled native helper (Windows)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows native helper
        shell: pwsh
        run: |
          $out = "${{ runner.temp }}\native_spectrum_helper_c_poc.exe"
          powershell -ExecutionPolicy Bypass -File tools/build_native_spectrum_helper_c_poc.ps1 -OutPath $out

      - name: Upload Windows native helper
        uses: actions/upload-artifact@v4
        with:
          name: native-spectrum-helper-windows
          path: "${{ runner.temp }}\native_spectrum_helper_c_poc.exe"
          if-no-files-found: error

  release:
    needs:
      - build-native-helper-linux
      - build-native-helper-windows
    runs-on: ubuntu-latest
    env:
      RELEASE_SIGN_ARTIFACTS: ${{ inputs.sign_artifacts }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine

      - name: Download native helper artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/native-spectrum-helpers
          pattern: native-spectrum-helper-*
          merge-multiple: false

      - name: Stage bundled native helper binaries
        run: |
          linux_src="$(find /tmp/native-spectrum-helpers -path '*/native-spectrum-helper-linux/*' -type f -name 'native_spectrum_helper_c_poc' -print -quit)"
          windows_src="$(find /tmp/native-spectrum-helpers -path '*/native-spectrum-helper-windows/*' -type f -name 'native_spectrum_helper_c_poc.exe' -print -quit)"

          if [ -z "${linux_src}" ]; then
            echo "Missing Linux bundled native helper artifact."
            echo "Checked under /tmp/native-spectrum-helpers for native-spectrum-helper-linux/native_spectrum_helper_c_poc"
            exit 1
          fi

          if [ -z "${windows_src}" ]; then
            echo "Missing Windows bundled native helper artifact."
            echo "Checked under /tmp/native-spectrum-helpers for native-spectrum-helper-windows/native_spectrum_helper_c_poc.exe"
            echo "Downloaded tree:"
            find /tmp/native-spectrum-helpers -maxdepth 4 -type f >/tmp/native-tree.txt
            cat /tmp/native-tree.txt
            exit 1
          fi

          mkdir -p src/tz_player/binaries/linux/x86_64 src/tz_player/binaries/windows/x86_64
          cp "${linux_src}" \
            src/tz_player/binaries/linux/x86_64/native_spectrum_helper_c_poc
          cp "${windows_src}" \
            src/tz_player/binaries/windows/x86_64/native_spectrum_helper_c_poc.exe
          chmod +x src/tz_player/binaries/linux/x86_64/native_spectrum_helper_c_poc
          ls -l src/tz_player/binaries/linux/x86_64/native_spectrum_helper_c_poc \
            src/tz_player/binaries/windows/x86_64/native_spectrum_helper_c_poc.exe

      - name: Verify staged helper artifacts
        run: |
          if [ ! -f src/tz_player/binaries/linux/x86_64/native_spectrum_helper_c_poc ]; then
            echo "Missing Linux bundled native helper."
            exit 1
          fi
          if [ ! -f src/tz_player/binaries/windows/x86_64/native_spectrum_helper_c_poc.exe ]; then
            echo "Missing Windows bundled native helper."
            exit 1
          fi

      - name: Resolve release tag/version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            raw="${GITHUB_REF_NAME}"
          else
            raw="${{ inputs.version }}"
          fi
          norm="${raw}"
          case "${norm}" in
            v*|V*) norm="${norm#?}" ;;
          esac
          if [ -z "${norm}" ]; then
            echo "Version input cannot be empty."
            exit 1
          fi
          echo "RELEASE_VERSION_NORM=${norm}" >> "${GITHUB_ENV}"
          echo "RELEASE_TAG=v${norm}" >> "${GITHUB_ENV}"

      - name: Set prerelease mode
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "RELEASE_PRERELEASE=${{ inputs.prerelease }}" >> "${GITHUB_ENV}"
          elif [[ "${RELEASE_VERSION_NORM}" =~ (a|b|rc|dev|post) ]]; then
            echo "RELEASE_PRERELEASE=true" >> "${GITHUB_ENV}"
          else
            echo "RELEASE_PRERELEASE=false" >> "${GITHUB_ENV}"
          fi

      - name: Ensure release tag exists and checkout
        run: |
          if ! git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} not found."
            echo "Create and push the tag first, then run this workflow."
            exit 1
          fi
          git checkout "${RELEASE_TAG}"

      - name: Build release notes from changelog
        run: |
          python tools/extract_changelog_release.py \
            --version "${RELEASE_VERSION_NORM}" \
            --changelog CHANGELOG.md \
            --output RELEASE_NOTES.md

      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Typecheck
        run: python -m mypy src

      - name: Tests
        run: python -m pytest

      - name: Build artifacts
        run: |
          python -m build
          python -m twine check dist/*

      - name: Release artifact guardrail
        run: |
          if ! python -m zipfile -l dist/*.whl | rg -i "binaries/linux/x86_64/native_spectrum_helper_c_poc"; then
            echo "Release package does not include bundled native helper binaries."
            exit 1
          fi
          if ! python -m zipfile -l dist/*.whl | rg -i "binaries/windows/x86_64/native_spectrum_helper_c_poc\\.exe"; then
            echo "Release package does not include Windows bundled helper binary."
            exit 1
          fi
          if python -m zipfile -l dist/*.whl | rg -i "libvlc\\.so|libvlc\\.dylib|vlc\\.dll|ffmpeg|avcodec|avformat|avutil|swresample|swscale"; then
            echo "Release policy violation: found bundled media/runtime binaries in wheel."
            exit 1
          fi
          if ! tar -tf dist/*.tar.gz | rg -i "tz_player/binaries/linux/x86_64/native_spectrum_helper_c_poc"; then
            echo "Source distribution does not include bundled Linux helper binary."
            exit 1
          fi
          if ! tar -tf dist/*.tar.gz | rg -i "tz_player/binaries/windows/x86_64/native_spectrum_helper_c_poc\\.exe"; then
            echo "Source distribution does not include bundled Windows helper binary."
            exit 1
          fi
          if tar -tf dist/*.tar.gz | rg -i "libvlc\\.so|libvlc\\.dylib|vlc\\.dll|ffmpeg|avcodec|avformat|avutil|swresample|swscale"; then
            echo "Release policy violation: found bundled media/runtime binaries in sdist."
            exit 1
          fi

      - name: Generate checksums
        run: |
          sha256sum dist/* > dist/SHA256SUMS

      - name: Import signing key
        if: env.RELEASE_SIGN_ARTIFACTS == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "Missing required secrets: RELEASE_GPG_PRIVATE_KEY / RELEASE_GPG_PASSPHRASE."
            exit 1
          fi
          echo "${GPG_PRIVATE_KEY}" | base64 --decode | gpg --batch --import

      - name: Sign artifacts
        if: env.RELEASE_SIGN_ARTIFACTS == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          for file in dist/*; do
            gpg \
              --batch \
              --yes \
              --pinentry-mode loopback \
              --passphrase "${GPG_PASSPHRASE}" \
              --armor \
              --detach-sign "${file}"
          done

      - name: Publish or update GitHub release
        run: |
          prerelease_flag=""
          if [ "${RELEASE_PRERELEASE}" = "true" ]; then
            prerelease_flag="--prerelease"
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file RELEASE_NOTES.md \
              ${prerelease_flag} \
              dist/*
          fi
