name: Native Helper Artifacts

on:
  workflow_dispatch:
    inputs:
      helper_version_label:
        description: "Optional label suffix for artifact names"
        required: false
        default: "helper"

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Helper (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build helper
        run: |
          bash tools/build_native_spectrum_helper.sh /tmp/tz_player_native_helper
          /tmp/tz_player_native_helper <<'EOF' >/tmp/native_helper_help_smoke.out || true
          {}
          EOF
          ls -lh /tmp/tz_player_native_helper

      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-spectrum-helper-linux-${{ inputs.helper_version_label }}
          path: /tmp/tz_player_native_helper
          if-no-files-found: error

  build-windows:
    name: Build Helper (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build helper
        shell: pwsh
        run: |
          $out = "$env:TEMP\tz_player_native_helper.exe"
          powershell -ExecutionPolicy Bypass -File tools/build_native_spectrum_helper.ps1 -OutPath $out
          Get-Item -LiteralPath $out | Format-List FullName,Length,LastWriteTime

      - name: Upload helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-spectrum-helper-windows-${{ inputs.helper_version_label }}
          path: ${{ runner.temp }}\tz_player_native_helper.exe
          if-no-files-found: error
