name: Release Cut
run-name: Release Cut v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: true
        default: false
        type: boolean
      sign_artifacts:
        description: "Sign artifacts with GPG (requires release signing secrets)"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-tag:
    name: Prepare version/changelog and tag
    runs-on: ubuntu-latest
    outputs:
      release_version_norm: ${{ steps.resolve.outputs.release_version_norm }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve release version
        id: resolve
        run: |
          raw="${{ inputs.version }}"
          norm="${raw}"
          case "${norm}" in
            v*|V*) norm="${norm#?}" ;;
          esac
          if [ -z "${norm}" ]; then
            echo "Version input cannot be empty."
            exit 1
          fi
          echo "release_version_norm=${norm}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=v${norm}" >> "${GITHUB_OUTPUT}"

      - name: Ensure release tag does not exist
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists locally in workflow checkout."
            exit 1
          fi
          if git ls-remote --tags origin "refs/tags/${tag}" | grep -q "refs/tags/${tag}"; then
            echo "Tag ${tag} already exists on origin."
            exit 1
          fi

      - name: Update version/changelog
        run: |
          python tools/release_prepare.py --version "${{ steps.resolve.outputs.release_version_norm }}"

      - name: Lint
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Typecheck
        run: python -m mypy src

      - name: Tests
        run: python -m pytest

      - name: Commit and push release metadata
        run: |
          git add src/tz_player/version.py CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No release changes were generated by release_prepare."
            exit 1
          fi
          tag="${{ steps.resolve.outputs.release_tag }}"
          git commit -m "release: ${tag}"
          git push origin HEAD:main

      - name: Create and push tag
        run: |
          tag="${{ steps.resolve.outputs.release_tag }}"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

  build-and-publish:
    name: Build and publish release artifacts
    needs: prepare-tag
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      version: ${{ needs.prepare-tag.outputs.release_version_norm }}
      force_rebuild: true
      prerelease: ${{ inputs.prerelease }}
      sign_artifacts: ${{ inputs.sign_artifacts }}
    secrets: inherit
